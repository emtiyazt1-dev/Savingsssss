<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Finance Workspace</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Remix Icons for Premium Minimalist Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #10B981; /* Emerald Glow */
            --primary-hover: #059669;
            --success: #34D399;
            --danger: #FB7185;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --card-bg: rgba(15, 35, 25, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 15px 35px 0 rgba(0, 0, 0, 0.4);
            --glow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Ultra Premium Deep Green Mesh-like Gradient */
            background: radial-gradient(circle at 15% 0%, #064E3B 0%, transparent 40%),
                        radial-gradient(circle at 85% 100%, #022C22 0%, transparent 40%),
                        linear-gradient(135deg, #021a14 0%, #043527 100%);
            color: var(--text-main);
            padding: 2rem 1rem;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header p {
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-size: 1.05rem;
            font-weight: 300;
        }

        /* Tabs / Slide Navigation */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .tab-btn i {
            font-size: 1.2rem;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #FFF;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #011C14;
            border-color: transparent;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
            font-weight: 600;
        }

        /* Slide Content */
        .slide {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .dash-card {
            text-align: center;
            padding: 2.5rem 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .dash-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--glow);
        }

        .dash-card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dash-card h2 {
            font-size: 2.5rem;
            margin-top: 1rem;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }
        .text-primary { color: var(--primary); text-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            color: #A7F3D0;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            background-color: rgba(0, 0, 0, 0.25);
            color: #FFFFFF;
            transition: all 0.3s ease;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            background-color: rgba(0, 0, 0, 0.4);
        }

        select option {
            background: #043527;
            color: white;
            padding: 10px;
        }

        button.submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: #011C14;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button.submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.5);
        }

        /* Lists */
        .list-container {
            margin-top: 1.5rem;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .list-container::-webkit-scrollbar { width: 5px; }
        .list-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .list-container::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.5); border-radius: 10px; }
        .list-container::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .item:hover { 
            background: rgba(255, 255, 255, 0.05); 
            border-color: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .item-info h4 { font-size: 1.1rem; color: #FFF; font-weight: 500; display: flex; align-items: center; gap: 8px;}
        .item-info p { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; display: flex; align-items: center; gap: 5px;}
        
        .bank-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            backdrop-filter: blur(5px);
        }

        .item-amount { font-weight: 600; font-size: 1.2rem; }

        /* Notes Grid */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.8rem;
            border-radius: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--primary);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .note-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .note-card i {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: rgba(255,255,255,0.1);
            font-size: 1.5rem;
        }

        .note-card p {
            color: #E2E8F0;
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
            position: relative;
            z-index: 1;
        }

        .note-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Bank Summary Grid */
        .bank-summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .bank-stat {
            background: rgba(0, 0, 0, 0.2);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .bank-stat:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(0, 0, 0, 0.3);
        }

        .bank-stat i {
            font-size: 2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
        }

        .bank-stat h4 { color: #FFF; margin-bottom: 8px; font-weight: 500;}
        .bank-stat h2 { color: var(--primary); font-size: 1.8rem; font-weight: 600;}

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="ri-leaf-line" style="color: var(--primary);"></i> VaultSpace</h1>
            <p>Aesthetic, Secure & Immutable Finance Tracker</p>
        </header>

        <!-- Navigation Slider/Tabs with Icons -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">
                <i class="ri-dashboard-2-line"></i> Dashboard
            </button>
            <button class="tab-btn" onclick="switchTab('transactions')">
                <i class="ri-history-line"></i> Transactions
            </button>
            <button class="tab-btn" onclick="switchTab('bank')">
                <i class="ri-wallet-3-line"></i> Bank & Cash
            </button>
            <button class="tab-btn" onclick="switchTab('notes')">
                <i class="ri-sticky-note-line"></i> Notes
            </button>
        </div>

        <!-- Slide 1: Dashboard -->
        <div id="dashboard" class="slide active">
            <div class="dashboard">
                <div class="card dash-card">
                    <h3><i class="ri-arrow-right-down-line text-success"></i> Total Inflow</h3>
                    <h2 class="text-success">৳ <span id="total-savings">0</span></h2>
                </div>
                <div class="card dash-card">
                    <h3><i class="ri-arrow-right-up-line text-danger"></i> Total Outflow</h3>
                    <h2 class="text-danger">৳ <span id="total-expense">0</span></h2>
                </div>
                <div class="card dash-card" style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.3);">
                    <h3 style="color: var(--text-main);"><i class="ri-safe-2-line text-primary"></i> Net Balance</h3>
                    <h2 class="text-primary">৳ <span id="current-balance">0</span></h2>
                </div>
            </div>
        </div>

        <!-- Slide 2: Transactions -->
        <div id="transactions" class="slide">
            <div class="card">
                <h2 style="margin-bottom: 1.5rem; color: #FFF; display: flex; align-items: center; gap: 8px;">
                    <i class="ri-add-circle-line" style="color: var(--primary);"></i> New Entry
                </h2>
                <form id="finance-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label><i class="ri-exchange-funds-line"></i> Transaction Type</label>
                            <select id="type" required>
                                <option value="savings">Money IN (+)</option>
                                <option value="expense">Money OUT (-)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="ri-money-dollar-circle-line"></i> Amount (৳)</label>
                            <input type="number" id="amount" placeholder="e.g. 5000" required min="1">
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label><i class="ri-bank-line"></i> Source / Bank</label>
                            <input type="text" id="bank" list="bank-list" placeholder="e.g. bKash, DBBL, Cash" required>
                            <datalist id="bank-list">
                                <option value="Cash">
                                <option value="bKash">
                                <option value="Nagad">
                                <option value="DBBL">
                                <option value="Islami Bank">
                                <option value="City Bank">
                            </datalist>
                        </div>
                        <div class="form-group">
                            <label><i class="ri-file-text-line"></i> Description</label>
                            <input type="text" id="desc" placeholder="e.g. Monthly Salary, Grocery..." required>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="ri-lock-2-line"></i> Save to Immutable Ledger
                    </button>
                </form>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2 style="color: #FFF;"><i class="ri-history-fill"></i> History</h2>
                    <span style="font-size: 0.8rem; color: var(--danger); background: rgba(251, 113, 133, 0.1); padding: 4px 10px; border-radius: 12px;">
                        <i class="ri-error-warning-line"></i> Immutable
                    </span>
                </div>
                
                <div class="list-container" id="transaction-list">
                    <!-- Transactions will appear here -->
                </div>
            </div>
        </div>

        <!-- Slide 3: Bank & Cash Status -->
        <div id="bank" class="slide">
            <div class="card">
                <h2 style="color: #FFF; margin-bottom: 2rem; text-align: center;">
                    <i class="ri-pie-chart-2-line" style="color: var(--primary);"></i> Fund Distribution
                </h2>
                <div class="bank-summary-grid" id="bank-summary">
                    <!-- Bank stats will be injected here -->
                </div>
            </div>
        </div>

        <!-- Slide 4: Notes -->
        <div id="notes" class="slide">
            <div class="card">
                <h2 style="margin-bottom: 1.5rem; color: #FFF; display: flex; align-items: center; gap: 8px;">
                    <i class="ri-quill-pen-line" style="color: var(--primary);"></i> Write a Note
                </h2>
                <form id="note-form">
                    <div class="form-group">
                        <textarea id="note-text" rows="4" placeholder="Write ideas, financial goals, or secret clues..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn"><i class="ri-save-3-line"></i> Add Note</button>
                </form>

                <div class="notes-grid" id="notes-list">
                    <!-- Notes will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // State variables
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let notes = JSON.parse(localStorage.getItem('notes')) || [];

        // Formatting Date
        const formatDate = (dateString) => {
            const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
            return new Date(dateString).toLocaleDateString('en-US', options);
        };

        // Switch Tabs Logic
        function switchTab(tabId) {
            document.querySelectorAll('.slide').forEach(slide => slide.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Update Dashboard & Bank Status
        function updateData() {
            // Dashboard Calc
            const totalSavings = transactions.filter(t => t.type === 'savings').reduce((acc, item) => acc + item.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((acc, item) => acc + item.amount, 0);
            const balance = totalSavings - totalExpense;

            document.getElementById('total-savings').innerText = totalSavings.toLocaleString();
            document.getElementById('total-expense').innerText = totalExpense.toLocaleString();
            document.getElementById('current-balance').innerText = balance.toLocaleString();

            // Bank Calc
            const bankBalances = {};
            transactions.forEach(t
